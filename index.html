<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña ❤️</title>
    <style>
        body { 
            background-color: #ffeef0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            overflow: hidden; /* Importante para que los corazones no creen barras de desplazamiento */
        }
        .sobre { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            width: 80%; 
            max-width: 300px; 
            position: relative;
            z-index: 10; /* Para que la tarjeta esté por encima de los corazones al principio */
        }
        img { width: 100%; border-radius: 15px; }
        button { 
            background: #ff4d6d; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-size: 18px; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.1); }
        #mensaje { 
            display: none; 
            font-size: 30px; 
            color: #ff4d6d; 
            margin-top: 15px; 
            font-weight: bold; 
            animation: latido 1s infinite; 
        }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Estilos para los corazones voladores */
        .corazon {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: volar 4s linear;
            opacity: 0;
            z-index: 5; /* Por debajo de la tarjeta */
        }

        @keyframes volar {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(calc(-50px + 100px * random())); /* Efecto zigzag aleatorio */
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="sobre">
        <img src="gatito.JPG" alt="Gatito">
        <button id="btn" onclick="abrir()">Abrir carta ✉️</button>
        <div id="mensaje">¡TE AMO MUCHO MI ABIGAIL ESTERLUZ! ❤️</div>
    </div>

    <script>
        function abrir() {
            // Muestra el mensaje y oculta el botón
            document.getElementById('mensaje').style.display = 'block';
            document.getElementById('btn').style.display = 'none';

            // Llama a la función para crear los corazones
            lluviaDeCorazones();
        }

        function lluviaDeCorazones() {
            const contenedorCorazones = document.body;
            
            // Crea 30 corazones
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const corazon = document.createElement('div');
                    corazon.classList.add('corazon');
                    corazon.innerHTML = '❤️';
                    
                    // Posición horizontal aleatoria
                    corazon.style.left = Math.random() * 100 + 'vw';
                    
                    // Velocidad y tamaño aleatorio para más realismo
                    corazon.style.animationDuration = Math.random() * 3 + 2 + 's'; // Entre 2s y 5s
                    corazon.style.fontSize = Math.random() * 10 + 15 + 'px'; // Entre 15px y 25px

                    contenedorCorazones.appendChild(corazon);

                    // Elimina el corazón después de que termine la animación
                    setTimeout(() => {
                        corazon.remove();
                    }, 5000); 
                }, i * 150); // Crea los corazones poco a poco
            }
        }
    </script>
</body>
</html>
